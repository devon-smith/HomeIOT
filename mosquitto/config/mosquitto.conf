persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# v1: LAN-only, no auth. Lock down before exposing remotely (use Tailscale + auth).
listener 1883
allow_anonymous true

# WebSocket listener for browser-based debugging (optional).
listener 9001
protocol websockets
allow_anonymous true

# Retained-message limits.
max_queued_messages 10000
