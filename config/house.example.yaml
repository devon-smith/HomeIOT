# Home definition. Copy to config/house.yaml and fill in for your home.
# Adapters read this file at startup to know which rooms/devices they own.

timezone: America/Los_Angeles

rooms:
  living_room:
    label: Living Room
    devices:
      music:
        adapter: sonos
        config:
          sonos_zone: "Living Room"
      lights:
        adapter: control4
        config:
          c4_proxy_id: 0  # fill in from Composer

  kitchen:
    label: Kitchen
    devices:
      music:
        adapter: sonos
        config:
          sonos_zone: "Kitchen"
      lights:
        adapter: control4
        config:
          c4_proxy_id: 0
      skylight:
        adapter: control4
        config:
          c4_skylight_ids: [0]  # fill in from Composer / discovery

  theater:
    label: Theater
    devices:
      music:
        adapter: sonos
        config:
          sonos_zone: "Theater"
      tv:
        adapter: tv
        config:
          brand: samsung   # samsung | lg | sony | apple_tv | mock
          ip: 192.168.1.0  # fill in — for IP-controlled brands (samsung/lg/sony)
      lights:
        adapter: control4
        config:
          c4_proxy_id: 0

  backyard:
    label: Backyard
    devices:
      music:
        adapter: sonos
        config:
          sonos_zone: "Backyard"
      hot_tub:
        adapter: iaqualink
        config:
          system: spa
      pool:
        adapter: iaqualink
        config:
          system: pool
      fountain:
        adapter: tuya
        config:
          kind: switch       # on/off only
          device_id: ""      # fill in from `tinytuya wizard`
          local_key: ""      # fill in from `tinytuya wizard`

  sauna:
    label: Sauna
    devices:
      sauna:
        adapter: tuya
        config:
          kind: climate      # set_target / set_mode + temperature reads
          device_id: ""      # fill in
          local_key: ""      # fill in

# Zones: cross-room logical groupings the LLM can target.
zones:
  outdoor: [backyard]
  upstairs: []
  downstairs: [living_room, kitchen, theater]

# Scenes live in config/scenes.yaml (see config/scenes.example.yaml). The C4
# dealer owns Composer-internal scenes; the brain owns cross-vendor
# compositions. Both are first-class — see ARCHITECTURE.md "Scenes".

# Actors: base set, reconciled into the Postgres `actors` table on startup.
# Runtime additions (e.g. temporary house-sitters with expires_at) live only
# in the table — no yaml edit needed. See TOOL_SCHEMA.md for permissions.
actors:
  owner:
    role: owner
    imessage_handles: []  # fill in with phone numbers / Apple IDs
  partner:
    role: partner
    imessage_handles: []
