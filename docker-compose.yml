services:
  # Backing services bind to 127.0.0.1 only — the brain process runs on the same
  # host and talks to them via localhost. Keeping them off 0.0.0.0 means they
  # are NOT reachable from the tailnet (and not from the LAN either). Only
  # the brain's own HTTP port 3000 should be exposed externally; tighten its
  # exposure via Tailscale ACLs, not by binding more services.
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: home-brain-mosquitto
    ports:
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: home-brain-postgres
    environment:
      POSTGRES_USER: home_brain
      POSTGRES_PASSWORD: home_brain
      POSTGRES_DB: home_brain
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U home_brain"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: home-brain-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mosquitto-data:
  mosquitto-log:
  postgres-data:
  redis-data:
